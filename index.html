<!DOCTYPE html>
<html lang="id" style="scroll-behavior: smooth;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>KaeDesu | Anime Streaming Kawaii Professional</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --brand: #ff3e3e; }
        
        body { 
            background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased; overscroll-behavior-y: none;
        }

        /* Anti Scroll-Clash saat Modal Aktif */
        body.modal-open { overflow: hidden !important; height: 100vh !important; }

        .loading-pulse {
            width: 40px; height: 4px; background: var(--brand);
            border-radius: 10px; margin: 0 auto;
            animation: pulse-glow 1.2s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.1; transform: scaleX(0.8); }
            50% { opacity: 1; transform: scaleX(1.2); box-shadow: 0 0 15px var(--brand); }
        }

        .nebula-bg { 
            position: fixed; inset: 0; z-index: -10; 
            background: linear-gradient(125deg, #000, #1a0000, #0a0025, #000); 
            background-size: 300% 300%; animation: nebulaMove 12s ease-in-out infinite; 
            filter: blur(30px) brightness(0.8); pointer-events: none;
            transform: translateZ(0); 
        }
        @keyframes nebulaMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .bg-overlay { 
            position: fixed; inset: 0; z-index: 1500; 
            background: rgba(0,0,0,0.8); opacity: 0;
            pointer-events: none; transition: opacity 0.4s ease;
        }
        .bg-overlay.active { opacity: 1; pointer-events: auto; }

        /* Header & Navigation */
        .header-wrap { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            transform: translateZ(0);
        }
        .brand-box { height: 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.03); padding: 0 18px; }
        .brand-text { font-weight: 800; letter-spacing: -1.5px; font-style: italic; font-size: 20px; text-transform: uppercase; }
        .neon-glow { color: var(--brand); text-shadow: 0 0 15px rgba(255, 62, 62, 0.8); }

        .menu-toggle { width: 30px; height: 20px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; z-index: 2500; position: relative; }
        .menu-toggle span { width: 100%; height: 2px; background: #fff; border-radius: 10px; transition: 0.3s; }
        .menu-toggle.active span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

        #sideMenu {
            position: fixed; top: 0; right: -100%; width: 75%; height: 100%;
            background: #000; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; border-left: 1px solid rgba(255,255,255,0.1);
        }
        #sideMenu.open { right: 0; }
        .menu-content { flex-grow: 1; padding: 100px 30px 30px 30px; overflow-y: auto; }
        .menu-link { display: block; padding: 15px 0; font-size: 14px; font-weight: 900; text-transform: uppercase; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.05); letter-spacing: 2px; }
        .menu-link i { color: var(--brand); margin-right: 12px; width: 20px; }

        .search-container { padding: 14px 18px 4px 18px; }
        .search-bar { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 100px; padding: 4px 4px 4px 16px; }
        .search-input { flex-grow: 1; background: transparent; border: none; font-size: 12px; font-weight: 600; color: #fff; outline: none; height: 32px; }
        .search-btn { width: 32px; height: 32px; background: var(--brand); border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        .genre-chips { display: flex; overflow-x: auto; gap: 10px; padding: 14px 18px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .chip { flex: 0 0 auto; padding: 8px 22px; border-radius: 100px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); font-size: 11px; font-weight: 800; color: #777; text-transform: uppercase; cursor: pointer; }
        .chip.active { background: var(--brand); color: #fff; border-color: var(--brand); box-shadow: 0 0 15px rgba(255,62,62,0.4); }

        main { padding-top: 215px; position: relative; z-index: 10; }

        /* Row Anime Style */
        .section-header { display: flex; align-items: center; justify-content: space-between; gap: 15px; margin-bottom: 22px; padding: 0 24px; }
        .section-title-group { display: flex; align-items: center; gap: 15px; flex-grow: 1; }
        .section-bar { height: 1px; flex-grow: 1; background: linear-gradient(90deg, var(--brand), transparent); opacity: 0.5; }
        .section-title { font-size: 11px; font-weight: 900; text-transform: uppercase; tracking: 0.25em; color: #fff; white-space: nowrap; }
        .see-all { font-size: 10px; font-weight: 800; color: var(--brand); text-transform: uppercase; cursor: pointer; padding: 5px; }

        .row-container { display: flex; overflow-x: auto; gap: 14px; padding: 0 18px 45px 18px; scrollbar-width: none; min-height: 180px; -webkit-overflow-scrolling: touch; }
        .anime-item { flex: 0 0 30%; transform: translateZ(0); cursor: pointer; }
        .poster-wrapper { aspect-ratio: 2/3; border-radius: 16px; overflow: hidden; background: #111; border: 1px solid rgba(255,255,255,0.15); }
        .poster-wrapper img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.4s ease; }
        .poster-wrapper img.loaded { opacity: 1; }
        .anime-title { font-size: 10px; font-weight: 700; margin-top: 10px; line-clamp: 2; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; text-transform: uppercase; color: #fff; line-height: 1.4; opacity: 0.9; }

        /* Modal Detail */
        #animeModal { position: fixed; inset: 0; background: #000; z-index: 4000; display: none; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .modal-banner { width: 100%; height: 50vh; position: relative; }
        .modal-banner img { width: 100%; height: 100%; object-fit: cover; }
        .modal-banner::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, #000 15%, transparent 100%); }
        .btn-close-modal { position: fixed; top: 20px; right: 20px; width: 35px; height: 35px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 4100; border: 1px solid rgba(255,255,255,0.1); }
        .modal-info { padding: 0 25px 50px 25px; margin-top: -60px; position: relative; z-index: 5; }
        .m-title { font-size: 24px; font-weight: 900; line-height: 1.1; margin-bottom: 10px; text-transform: uppercase; }
        .m-meta { font-size: 11px; font-weight: 700; color: #888; display: flex; gap: 15px; margin-bottom: 10px; }
        .m-score { color: var(--brand); }
        
        .ep-list { display: flex; flex-direction: column; gap: 12px; }
        .ep-box { display: flex; align-items: center; justify-content: space-between; background: #111; padding: 15px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .ep-tag { font-size: 11px; font-weight: 800; color: #fff; text-transform: uppercase; }
        .ep-btn { width: 32px; height: 32px; background: var(--brand); border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* FIXED PLAYER VIEW (SOLUSI VIDEO KEPOTONG) */
        #playerView { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .player-header { position: fixed; top: 0; width: 100%; z-index: 5200; padding: 15px 20px; display: flex; align-items: center; background: rgba(0,0,0,0.9); border-bottom: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); height: 60px; }
        
        #videoContainer { position: fixed; top: 60px; left: 0; width: 100%; aspect-ratio: 16/9; background: #111; z-index: 5100; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        
        .player-controls { position: relative; z-index: 5001; padding: 25px 20px; margin-top: calc(60px + 56.25vw); }
        
        .server-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 30px; }
        .btn-server { background: #111; border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; text-align: center; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #888; cursor: pointer; }
        .btn-server.active { border-color: var(--brand); color: #fff; background: rgba(255, 62, 62, 0.1); }

        .ep-grid-player { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 30px; }
        .btn-ep-player { background: #111; border: 1px solid rgba(255,255,255,0.1); padding: 12px 0; border-radius: 8px; text-align: center; font-size: 11px; font-weight: 800; color: #888; cursor: pointer; }
        .btn-ep-player.active { background: var(--brand); color: #fff; border-color: var(--brand); }

        /* Global View Header */
        .view-header { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: flex; align-items: center; padding: 0 20px; z-index: 3100; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .btn-back { width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 15px; }

        .m-divider { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .m-divider-line { height: 1px; flex-grow: 1; background: rgba(255,255,255,0.1); }
        .m-divider-text { font-size: 10px; font-weight: 900; color: var(--brand); letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="nebula-bg"></div>
    <div class="bg-overlay" id="overlay" onclick="toggleMenu()"></div>

    <div id="sideMenu">
        <div class="menu-content">
            <a href="#" class="menu-link" onclick="toggleMenu(); closeToHome();"><i class="fa-solid fa-house"></i> Home</a>
            <a href="#" class="menu-link" onclick="toggleMenu(); openFull('Update', '/seasons/now')"><i class="fa-solid fa-fire"></i> New Update</a>
            <a href="https://saweria.co/Kaedesu" target="_blank" class="menu-link" onclick="toggleMenu()"><i class="fa-solid fa-heart"></i> Saweria</a>
        </div>
    </div>

    <div class="header-wrap">
        <div class="brand-box">
            <div class="brand-text">KAE<span class="neon-glow">DESU</span></div>
            <div class="menu-toggle" id="menuToggle" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>
        </div>
        <div class="search-container">
            <div class="search-bar">
                <input type="text" class="search-input" placeholder="Cari Anime..." id="searchInput">
                <button class="search-btn" id="btnSearch"><i class="fa-solid fa-magnifying-glass text-white text-[11px]"></i></button>
            </div>
        </div>
        <div class="genre-chips" id="mainChips"></div>
    </div>

    <main id="mainContent"></main>

    <div id="fullListView" class="fixed inset-0 bg-black z-[3000] hidden overflow-y-auto pt-20">
        <div class="view-header">
            <div class="btn-back" onclick="history.back()"><i class="fa-solid fa-arrow-left text-white"></i></div>
            <div class="view-title text-[13px] font-black uppercase text-[#ff3e3e]" id="fullTitle">KATEGORI</div>
        </div>
        <div class="grid grid-cols-3 gap-[15px] p-5" id="fullGrid"></div>
    </div>

    <div id="animeModal">
        <div class="btn-close-modal" onclick="history.back()"><i class="fa-solid fa-xmark text-white"></i></div>
        <div id="modalContent"></div>
    </div>

    <div id="playerView">
        <div class="player-header">
            <div class="btn-back-player w-[35px] h-[35px] bg-white/10 rounded-full flex items-center justify-center" onclick="history.back()"><i class="fa-solid fa-arrow-left text-white"></i></div>
            <div id="pTitle" class="ml-4 text-[10px] font-black uppercase text-white tracking-widest truncate">Memutar...</div>
        </div>
        <div id="videoContainer"></div>
        <div class="player-controls">
            <div class="m-divider"><span class="m-divider-text">SERVER</span><div class="m-divider-line"></div></div>
            <div class="server-grid" id="serverGrid"></div>
            
            <div class="m-divider" style="margin-top: 24px;"><span class="m-divider-text">EPISODE</span><div class="m-divider-line"></div></div>
            <div class="ep-grid-player" id="playerEpList"></div>
        </div>
    </div>

    <script>
        const API = 'https://api.jikan.moe/v4';
        const delay = ms => new Promise(res => setTimeout(res, ms));

        const CATS = [
            { name: 'New Update', id: 'catTrend', query: '/seasons/now', color: '#ff3e3e' },
            { name: 'Romance', id: 'catRomance', query: '/anime?genres=22', color: '#ec4899' },
            { name: 'Action', id: 'catAction', query: '/anime?genres=1', color: '#3b82f6' },
            { name: 'Isekai', id: 'catIsekai', query: '/anime?genres=62', color: '#10b981' }
        ];

        let currentStream = { malId: 0, ep: 1, title: '', totalEps: 1 };

        function closeToHome() {
            while(window.history.state && window.history.state.v) { window.history.back(); }
            renderViews();
        }

        function toggleBodyLock(lock) {
            document.body.classList[lock ? 'add' : 'remove']('modal-open');
        }

        function renderViews() {
            const state = window.history.state ? window.history.state.v : null;
            
            document.getElementById('playerView').style.display = (state === 'player') ? 'flex' : 'none';
            document.getElementById('animeModal').style.display = (state === 'detail' || state === 'player') ? 'block' : 'none';
            document.getElementById('fullListView').style.display = (state === 'full') ? 'block' : 'none';
            
            toggleBodyLock(!!state);
            if (!state) document.getElementById('videoContainer').innerHTML = '';
        }

        async function startStreaming(malId, ep, rawTitle, totalEps) {
            currentStream = { malId, ep, title: rawTitle, totalEps: totalEps || 1 };
            document.getElementById('pTitle').innerText = `${rawTitle} - EP ${ep}`;

            // Render Servers
            document.getElementById('serverGrid').innerHTML = `
                <div class="btn-server active" onclick="changeServer(0, this)">SERVER HD</div>
                <div class="btn-server" onclick="changeServer(1, this)">SERVER VIP</div>
            `;

            // Render Episodes
            const epContainer = document.getElementById('playerEpList');
            let epsHtml = '';
            for(let i = 1; i <= currentStream.totalEps; i++) {
                const safeTitle = rawTitle.replace(/'/g, "\\'");
                epsHtml += `<div class="btn-ep-player ${i===ep?'active':''}" onclick="startStreaming(${malId}, ${i}, '${safeTitle}', ${currentStream.totalEps})">${i}</div>`;
            }
            epContainer.innerHTML = epsHtml;

            if(window.history.state?.v !== 'player') history.pushState({v:'player'}, '');
            renderViews();
            changeServer(0);
            document.getElementById('playerView').scrollTo(0,0);
        }

        function changeServer(idx, el) {
            if(el) {
                document.querySelectorAll('#serverGrid .btn-server').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
            const container = document.getElementById('videoContainer');
            container.innerHTML = '<div class="h-full w-full flex items-center justify-center bg-[#050505]"><div class="loading-pulse"></div></div>';
            
            const sources = [
                `https://vidsrc.to/embed/anime/${currentStream.malId}/${currentStream.ep}`,
                `https://vidsrc.me/embed/anime/${currentStream.malId}/${currentStream.ep}`
            ];

            setTimeout(() => {
                container.innerHTML = `
                    <iframe src="${sources[idx]}" allowfullscreen referrerpolicy="no-referrer" 
                    allow="autoplay; fullscreen; picture-in-picture"
                    style="width:100%; height:100%; border:none;"></iframe>`;
            }, 300);
        }

        async function openAnimeModal(id) {
            const content = document.getElementById('modalContent');
            history.pushState({v:'detail'}, '');
            renderViews();
            content.innerHTML = '<div class="h-screen flex items-center justify-center"><div class="loading-pulse"></div></div>';
            
            try {
                const res = await fetch(`${API}/anime/${id}/full`);
                const { data } = await res.json();
                const total = data.episodes || 1;
                let epHtml = '';
                for(let i=1; i<=total; i++){
                    const safeTitle = data.title.replace(/'/g, "\\'");
                    epHtml += `<div class="ep-box" onclick="startStreaming(${data.mal_id}, ${i}, '${safeTitle}', ${total})"><span class="ep-tag">Episode ${i}</span><div class="ep-btn"><i class="fa-solid fa-play text-white text-[10px]"></i></div></div>`;
                }
                content.innerHTML = `
                    <div class="modal-banner"><img src="${data.images.jpg.large_image_url}"></div>
                    <div class="modal-info">
                        <h2 class="m-title">${data.title}</h2>
                        <div class="m-meta">
                            <span class="m-score"><i class="fa-solid fa-star mr-1"></i>${data.score || 'N/A'}</span>
                            <span>${data.type}</span>
                            <span>${data.year || '-'}</span>
                        </div>
                        <div class="m-divider"><span class="m-divider-text">PILIH EPISODE</span><div class="m-divider-line"></div></div>
                        <div class="ep-list">${epHtml}</div>
                    </div>`;
            } catch(e) { content.innerHTML = '<p class="text-center py-20">Gagal memuat detail anime.</p>'; }
        }

        async function openFull(title, path) {
            document.getElementById('fullTitle').innerText = title;
            history.pushState({v:'full'}, '');
            renderViews();
            const res = await fetch(`${API}${path}${path.includes('?')?'&':'?'}limit=24&sfw=true`);
            const { data } = await res.json();
            document.getElementById('fullGrid').innerHTML = data.map(a => `
                <div class="anime-item" onclick="openAnimeModal(${a.mal_id})">
                    <div class="poster-wrapper"><img src="${a.images.jpg.image_url}" loading="lazy" onload="this.classList.add('loaded')"></div>
                    <h4 class="anime-title">${a.title}</h4>
                </div>`).join('');
        }

        async function init() {
            const main = document.getElementById('mainContent');
            const chips = document.getElementById('mainChips');
            main.innerHTML = ''; 
            for(const c of CATS) {
                chips.innerHTML += `<div class="chip" onclick="scrollToCat('${c.id}', this)">${c.name}</div>`;
                main.innerHTML += `
                    <div id="${c.id}" class="mb-12">
                        <div class="section-header">
                            <div class="section-title-group">
                                <h3 class="section-title" style="color:${c.color}">${c.name}</h3>
                                <div class="section-bar" style="background:linear-gradient(90deg, ${c.color}, transparent)"></div>
                            </div>
                            <div class="see-all" style="color:${c.color}" onclick="openFull('${c.name}', '${c.query}')">Semua <i class="fa-solid fa-chevron-right ml-1"></i></div>
                        </div>
                        <div id="row-${c.id}" class="row-container"><div class="loading-pulse mt-8"></div></div>
                    </div>`;
            }
            for(const c of CATS) { await fetchRow(`${API}${c.query}`, `row-${c.id}`); await delay(400); }
            document.querySelector('.chip').classList.add('active');
        }

        async function fetchRow(url, target) {
            try {
                const res = await fetch(url + (url.includes('?') ? '&' : '?') + 'limit=12&sfw=true');
                const { data } = await res.json();
                document.getElementById(target).innerHTML = data.map(a => `
                    <div class="anime-item" onclick="openAnimeModal(${a.mal_id})">
                        <div class="poster-wrapper"><img src="${a.images.jpg.image_url}" loading="lazy" onload="this.classList.add('loaded')"></div>
                        <h4 class="anime-title">${a.title}</h4>
                    </div>`).join('');
            } catch(e) {}
        }

        function toggleMenu() {
            document.getElementById('menuToggle').classList.toggle('active');
            document.getElementById('sideMenu').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function scrollToCat(id, el) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            const target = document.getElementById(id);
            if(target) window.scrollTo({ top: target.offsetTop - 215, behavior: 'smooth' });
        }

        document.getElementById('btnSearch').onclick = () => {
            const val = document.getElementById('searchInput').value;
            if(val.length > 2) openFull('Hasil Cari', `/anime?q=${encodeURIComponent(val)}`);
        };

        window.onpopstate = renderViews;
        init();
    </script>
</body>
</html>
